<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画阅读 - {{ current_path_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }
        .reader-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            gap: 12px;
            backdrop-filter: blur(8px);
        }
        .reader-bar .title {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .reader-bar .count {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            white-space: nowrap;
        }
        .reader-bar .close-btn {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .reader-bar .close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .manga-container {
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
        }
        .manga-item {
            width: 100%;
            line-height: 0;
        }
        .manga-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .manga-empty {
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 120px 20px;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
    </style>
</head>
<body>
    <div class="reader-bar">
        <a class="close-btn" onclick="window.close()" title="关闭">&times;</a>
        <span class="title">{{ current_path_name }}</span>
        <span class="count">{{ images|length }} 张</span>
    </div>
    <div class="manga-container">
        {% if images %}
            {% for image in images %}
            <div class="manga-item">
                <img src="/pin-tu/media/{{ root_b64 }}?p={{ (current_subpath + image) | urlencode }}" alt="{{ image }}" loading="lazy">
            </div>
            {% endfor %}
        {% else %}
            <div class="manga-empty">此文件夹没有图片</div>
        {% endif %}
    </div>
</body>
</html>
